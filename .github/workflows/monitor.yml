name: DNT Cabin Monitor

on:
  schedule:
    # Every 15 minutes (UTC)
    - cron: '*/15 * * * *'
  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Send a test email only (skip availability check)'
        type: boolean
        default: false

permissions:
  contents: write  # needed to commit state.json back to repo

jobs:
  check-availability:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            httr2
            jsonlite

      - name: Check availability and send notifications
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:   ${{ secrets.EMAIL_TO }}
          TEST_EMAIL: ${{ inputs.test_email }}
        run: Rscript monitor.R

      - name: Commit updated state
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add state.json
          # Only commit if state.json actually changed
          if git diff --quiet --staged; then
            echo "No changes to state.json — skipping commit."
          else
            git commit -m "Update availability state [skip ci]"
            git push
          fi
